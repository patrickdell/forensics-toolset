<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0f1117"/>
  <!-- Image grid (stylised) -->
  <rect x="4" y="4" width="16" height="12" rx="1.5" fill="none" stroke="#2d3148" stroke-width="1.5"/>
  <line x1="4" y1="9.5" x2="20" y2="9.5" stroke="#2d3148" stroke-width="1"/>
  <line x1="11.5" y1="4" x2="11.5" y2="16" stroke="#2d3148" stroke-width="1"/>
  <!-- Magnifying glass circle -->
  <circle cx="19" cy="19" r="7" fill="none" stroke="#4d9fff" stroke-width="2.5"/>
  <!-- Handle -->
  <line x1="24.2" y1="24.2" x2="28" y2="28" stroke="#4d9fff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Crosshair inside lens -->
  <line x1="19" y1="15.5" x2="19" y2="22.5" stroke="#4d9fff" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="15.5" y1="19" x2="22.5" y2="19" stroke="#4d9fff" stroke-width="1" stroke-opacity="0.6"/>
</svg>
